# This is a basic workflow to help you get started with Actions

name: dbt

# Controls when the workflow will run
on:
  # Triggers the workflow on pull request events but only for the "main" branch
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  install-dbt:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Шаг 1.1: Скачиваем наш код из репозитория на виртуальную машину
      - name: Скачиваем код
        uses: actions/checkout@v4
      # Шаг 1.2: Устанавливаем Python
      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Магия кэширования! Ускоряет установку зависимостей
      # Шаг 1.3: Установка библиотек
      - name: Устанавливаем зависимости python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Устанавливаем зависимости dbt
        run: |
          cd dbt/hw1
          dbt deps
      
      - name: Проверка SQL и Jinja синтаксиса
        run: dbt parse

      - name: Тестируем измененные модели
        run: dbt test --select state:modified+ --defer --state artifacts/prod
        #state:modified+ = все что изменилось плюс зависимости
        # --defer все остальное сравниваем со --state artifacts/prod то есть с продом

      - name: Запуск измененной модели
        run: dbt run --target ci --select state:modified+ --defer --state artifacts/prod  
        # --target ci = целевая система загрузки из ~/.dbt/profiles.yml
        

